name: cicd-documentation

on:
  push:
    branches:
      - main

jobs:
  run:
    name: 🚀 Run
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🚀 Run
        shell: bash
        run: |
          cd laboratories/cicd-documentation
          python3 find_tests.py
